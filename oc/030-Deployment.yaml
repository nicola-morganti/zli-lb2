# Frontend
kind: Deployment
apiVersion: apps/v1
metadata:
  name: quotesweb # Change only if related Service/Route names are updated too.
  labels:
    app: quotes-app
    app.kubernetes.io/part-of: quotes-app
spec:
  replicas: 1 # Raise/lower for baseline capacity (unless you add an HPA for frontend).
  selector:
    matchLabels:
      app: quotesweb # Must match template.labels exactly; do not drift.
  template:
    metadata:
      labels:
        app: quotesweb
    spec:
      containers:
        - name: quotes
          ports:
            - containerPort: 3000 # Change only if the app listens on another internal port.
              protocol: TCP
          image: 'quay.io/donschenck/quotesweb:v1' # Change tag/image to deploy new frontend versions.
          imagePullPolicy: Always # Use IfNotPresent in stable environments to reduce pulls.
---
# Backend
kind: Deployment
apiVersion: apps/v1
metadata:
  name: quotes # If changed, update Service, Route, and HPA scaleTargetRef.
  labels:
    app: quotes-app
    app.kubernetes.io/part-of: quotes-app
spec:
  replicas: 1 # Baseline pods; HPA can scale from this minimum upward.
  selector:
    matchLabels:
      app: quotes # Must match pod template labels and Service selector.
  template:
    metadata:
      labels:
        app: quotes
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: quotes
          image: ghcr.io/im24a-mendolag/quotes-postgres:latest
          ports:
            - containerPort: 10000 # Keep aligned with Service/Route target ports.
              protocol: TCP
          env:
            - name: DB_SERVICE_NAME
              value: postgres # Change only if DB Service name changes or external DB is used.
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          resources:
            limits:
              cpu: '2' # Tune for peak usage; too low can throttle, too high wastes quota.
            requests:
              cpu: '1' # Tune for scheduling and autoscaling behavior (HPA uses utilization).
          imagePullPolicy: Always # IfNotPresent can reduce startup latency in repeated deploys.
---
# Database
kind: Deployment
apiVersion: apps/v1
metadata:
  name: postgres # If changed, update DB Service and backend DB_SERVICE_NAME.
  labels:
    app: quotes-app
    app.kubernetes.io/part-of: quotes-app
spec:
  replicas: 1 # Keep at 1 for single-writer DB unless using clustered DB architecture.
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      volumes:
        - name: postgresvolume
          persistentVolumeClaim:
            claimName: postgresvolume # Must match PVC metadata.name.
      containers:
        - resources:
            limits:
              cpu: 500m # Increase for higher query load.
              memory: 512Mi # Increase to avoid OOM on larger datasets.
          name: postgres
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret # Must match Secret metadata.name.
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432 # Default PostgreSQL port.
              protocol: TCP
          imagePullPolicy: Always # For pinned tags, IfNotPresent is often sufficient.
          volumeMounts:
            - name: postgresvolume
              mountPath: /var/lib/postgresql/data # PostgreSQL data directory.
          image: postgres:15 # Pin a version tag for reproducible deploys.
