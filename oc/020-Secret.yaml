# Database
kind: Secret
apiVersion: v1
metadata:
  name: postgres-secret # Change only if you also update Deployment secretKeyRef.name.
  labels:
    app: quotes-app
    app.kubernetes.io/part-of: quotes-app
data:
  POSTGRES_PASSWORD: YWRtaW4= # Base64 value; rotate for security and never keep real secrets in git.
  POSTGRES_USER: YWRtaW4= # Base64("admin")
  POSTGRES_DB: cXVvdGVzZGI= # Base64("quotesdb")
type: Opaque # Keep Opaque for generic key/value credentials.
